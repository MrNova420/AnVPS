# AnVPS Main Configuration — v1.0.0
# Auto-detected on install, edit to customize

# --- Tier ---
ANVPS_TIER="auto"
ANVPS_VERSION="1.0.0"
ANVPS_DIR="${HOME}/.anvps"
ANVPS_HOSTNAME="anvps-device"

# --- Ports ---
ANVPS_PORT_BASE=7000
ANVPS_SSH_PORT=7022
ANVPS_WEB_PORT=7080
ANVPS_HTTPS_PORT=7443
ANVPS_FILE_PORT=7444
ANVPS_VPN_PORT=7518
ANVPS_DB_PORT=7306
ANVPS_CODE_PORT=7443

# --- SSH ---
ANVPS_SSH_TYPE="auto"

# --- HTTPD ---
ANVPS_HTTPD_TYPE="auto"

# --- Bot ---
ANVPS_BOT_TYPE="auto"

# --- Monitoring ---
ANVPS_MONITORING="auto"

# --- Updates ---
ANVPS_AUTO_UPDATE=true
ANVPS_UPDATE_INTERVAL="weekly"
ANVPS_AUTO_BACKUP=true
ANVPS_BACKUP_INTERVAL="weekly"
ANVPS_BACKUP_RETENTION=5

# --- Logging ---
ANVPS_LOG_LEVEL="info"
ANVPS_LOG_RETENTION_DAYS=30

# --- Watchdog ---
ANVPS_WATCHDOG=true
ANVPS_WATCHDOG_INTERVAL=30
ANVPS_MONITOR_INTERVAL=30

# --- Tunnels ---
ANVPS_TUNNEL_TYPE="cloudflare"
ANVPS_TUNNEL_TOKEN=""
ANVPS_NGROK_TOKEN=""
ANVPS_DDNS_ENABLED=false
ANVPS_DDNS_PROVIDER=""
ANVPS_DDNS_DOMAIN=""
ANVPS_DDNS_TOKEN=""

# --- Bots ---
ANVPS_TELEGRAM_BOT_TOKEN=""
ANVPS_TELEGRAM_CHAT_ID=""
ANVPS_DISCORD_BOT_TOKEN=""
ANVPS_DISCORD_CHANNEL_ID=""

# --- Web UI ---
ANVPS_WEB_PASSWORD="anvps_admin"
ANVPS_WEB_SSL=false
ANVPS_WEB_SSL_CERT=""
ANVPS_WEB_SSL_KEY=""

# --- Security ---
ANVPS_STEALTH=false
ANVPS_STEALTH_START_HOUR=0
ANVPS_STEALTH_END_HOUR=24
ANVPS_OBFUSCATE=false
ANVPS_OBFUSCATE_INTERVAL="daily"
ANVPS_ENCRYPT_STORAGE=false
ANVPS_ENCRYPT_PASSWORD=""
ANVPS_TAMPER_DETECTION=true
ANVPS_TAMPER_MAX_FAILED=10
ANVPS_DEAD_MAN_DAYS=30
ANVPS_VPN_KILLSWITCH=false
ANVPS_VPN_IFACE="wg0"
ANVPS_TOR_ENABLED=false
ANVPS_TOR_MODE="service"
ANVPS_DNS_PRIVACY=false
ANVPS_PORT_KNOCKING=false
ANVPS_DECOY_SERVICES=false
ANVPS_EPHEMERAL=false
ANVPS_SECURE_DELETE=false
ANVPS_MLOCK_MEMORY=false
ANVPS_NO_SWAP=false

# --- Misc ---
ANVPS_TIMEZONE="UTC"
